<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonde de Nova Russas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="welcomeScreen">
        <div class="welcome-box">
            <h1>Bonde de Nova Russas</h1>
            <img src="790c8191287a389131ccb943681ac8e0.gif" alt="Logo BNR" id="mainLogo">
            <div class="rules-section">
                <table><tbody id="rulesDisplay"></tbody></table>
            </div>
            <button id="btnEnter" class="tg-main-btn">ENTRAR NO CHAT</button>
        </div>
    </div>

    <div id="appContainer" class="hidden">
        <aside id="sidebar">
            <div class="sidebar-header">Canais BNR</div>
            <div class="topic-list" id="boardList"></div>
            <div class="sidebar-footer">
                <button id="adminBtn" class="admin-link" onclick="PainelADM.login()">⚙️ Entrar como ADM</button>
                <div id="adminTools" style="display:none; flex-direction: column; gap: 5px; padding: 10px; background: #17212b; border-radius: 8px; margin-top: 10px;">
                    <button onclick="PainelADM.gerirBoards()" class="admin-tool-btn">📂 Gerenciar Boards</button>
                    <button onclick="PainelADM.editarRegras()" class="admin-tool-btn">📜 Editar Regras</button>
                    <button onclick="PainelADM.blacklist()" class="admin-tool-btn">🚫 Blacklist</button>
                    <button onclick="PainelADM.logout()" class="admin-tool-btn" style="background:#ff5252; margin-top:10px; text-align:center;">🏃 Sair do ADM</button>
                </div>
            </div>
        </aside>

        <main id="main">
            <header id="top">
                <button id="menuToggle" class="icon-btn">☰</button>
                <div class="header-info">
                    <h2 id="boardTitle">/geral</h2>
                    <small>online agora</small>
                </div>
            </header>
            <div id="content"></div>
            <footer id="footer">
                <div id="fileInfo" class="hidden">
                    <span id="fileName"></span>
                    <button type="button" id="btnRemoveFile">×</button>
                </div>
                <form id="postForm">
                    <div class="input-area">
                        <button type="button" id="btnAttach" onclick="document.getElementById('fileInput').click()" class="icon-btn">📎</button>
                        <input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display:none">
                        <textarea id="postText" placeholder="Mensagem" rows="1"></textarea>
                        <button type="button" id="btnRecord" class="icon-btn">🎙️</button>
                        <button type="submit" id="btnSend" class="icon-btn">➤</button>
                    </div>
                </form>
            </footer>
        </main>
    </div>

    <script src="seguranca.js"></script>
    <script src="audio.js"></script>
    <script src="painel.js"></script>
    <script src="app.js"></script>
</body>
</html>
