<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="styles.css">
  <title>Bonde de Nova Russas</title>
</head>
<body>

  <div id="welcomeScreen">
    <div class="welcome-box">
      <h1 class="welcome-title">Bonde de Nova Russas</h1>
      <div class="mascot-container">
        <img src="790c8191287a389131ccb943681ac8e0.gif" alt="Mascote BNR" class="mascot">
      </div>
      <div class="rules-section">
        <h3>Regras da Casa</h3>
        <table class="rules-table">
          <tbody id="rulesTableBody">
            <tr><td>1. Sem spam ou flood.</td></tr>
            <tr><td>2. Respeite os membros.</td></tr>
            <tr><td>3. Proibido conteúdo ilegal.</td></tr>
          </tbody>
        </table>
      </div>
      <button id="btnEnter">ENTRAR NO CHAT</button>
    </div>
  </div>

  <div id="appContainer" class="hidden">
    <div id="sidebarOverlay" class="hidden"></div>
    
    <aside id="sidebar">
      <div class="sidebar-header">Canais BNR</div>
      <div class="topic-list"></div>
      <div class="sidebar-footer">
        <button id="adminBtn" class="admin-link">PAINEL ADM</button>
      </div>
    </aside>

    <main id="main">
      <header id="top">
        <button id="menuToggle">☰</button>
        <div class="header-info">
            <div class="group-logo">
                <img src="790c8191287a389131ccb943681ac8e0.gif" alt="Logo">
            </div>
            <div class="group-details">
                <span id="boardTitle">/geral</span>
                <small class="online-count">online agora</small>
            </div>
        </div>
        <div style="width:40px"></div> </header>

      <div id="content"></div>

      <footer id="footer">
        <div id="filePreview" class="hidden">
            <span id="fileNameDisplay"></span>
            <button type="button" id="btnCancelFile">×</button>
        </div>
        
        <form id="postForm">
          <div class="input-container">
            <div class="input-row">
              <input type="file" id="fileInput" style="display:none" accept="image/*">
              <button type="button" id="btnAttach" class="footer-btn">📎</button>
              
              <textarea id="postText" placeholder="Mensagem" rows="1" autocomplete="off"></textarea>
              
              <button type="button" id="btnRecord" class="footer-btn">🎙️</button>
              <button type="submit" id="btnSend" class="footer-btn">➤</button>
            </div>
          </div>
        </form>
      </footer>
    </main>
  </div>

  <script src="seguranca.js"></script>
  <script src="audio.js"></script>
  
  <script src="app.js"></script>

</body>
</html>
